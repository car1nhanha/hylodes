<button (click)="close.emit()">
  <ng-icon name="lucideX" />
</button>

<header>
  <h2>{{ title }}</h2>
  <p>{{ subtitle }}</p>
</header>

<div class="body">
  <ng-content />
</div>

<footer>
  <atom-button variant="outline" (action)="close.emit()">Cancel</atom-button>
  <atom-button (action)="action.emit()">Save</atom-button>
</footer>
