<template-auth [footer]="footerAuth" [body]="bodyAuth">
  <div class="form">
    <molecule-input [type]="'text'" [placeholder]="'Enter your name.'" label="Name" />
    <molecule-input [type]="'text'" [placeholder]="'example@mail.com'" label="E-mail" />
    <molecule-input [type]="'password'" [placeholder]="'Enter your password.'" label="Password" />
  </div>
  <atom-button size="full">Register</atom-button>
</template-auth>
